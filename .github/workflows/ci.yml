name: CI

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: ${{ secrets.CI_DB_NAME }}
          MYSQL_USER: ${{ secrets.CI_DB_USER }}
          MYSQL_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}
          MYSQL_ROOT_PASSWORD: ${{ secrets.CI_DB_ROOT_PASSWORD }}
        ports:
          - 3306:3306

    env:
      DB_URL: jdbc:mysql://127.0.0.1:3306/${{ secrets.CI_DB_NAME }}?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      DB_USERNAME: ${{ secrets.CI_DB_USER }}
      DB_PASSWORD: ${{ secrets.CI_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate CI DB secrets
        run: |
          test -n "${{ secrets.CI_DB_NAME }}"
          test -n "${{ secrets.CI_DB_USER }}"
          test -n "${{ secrets.CI_DB_PASSWORD }}"
          test -n "${{ secrets.CI_DB_ROOT_PASSWORD }}"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew clean build --no-daemon
