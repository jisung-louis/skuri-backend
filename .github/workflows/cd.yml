name: CD

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    name: Build And Push Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      image_uri: ${{ steps.image.outputs.image_uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive image metadata
        id: image
        run: |
          IMAGE_REPOSITORY="ghcr.io/$(echo "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          echo "image_uri=${IMAGE_REPOSITORY}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "latest_tag=${IMAGE_REPOSITORY}:latest" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.image_uri }}
            ${{ steps.image.outputs.latest_tag }}

  deploy-production:
    name: Deploy To Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build-image
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.PROD_GHCR_READ_TOKEN }}
        run: |
          test -n "$PROD_HOST"
          test -n "$PROD_SSH_USERNAME"
          test -n "$PROD_SSH_KEY"
          test -n "$GHCR_USERNAME"
          test -n "$GHCR_READ_TOKEN"

      - name: Install SSH key
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s' "$PROD_SSH_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          ssh-keyscan -p "${PROD_SSH_PORT:-22}" "$PROD_HOST" >> "$HOME/.ssh/known_hosts"

      - name: Upload production compose file
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.PROD_DEPLOY_DIR }}
        run: |
          TARGET_DIR="${DEPLOY_DIR:-/opt/skuri/app}"
          ssh -p "${PROD_SSH_PORT:-22}" -i "$HOME/.ssh/id_ed25519" "${PROD_SSH_USERNAME}@${PROD_HOST}" "mkdir -p '${TARGET_DIR}'"
          scp -P "${PROD_SSH_PORT:-22}" -i "$HOME/.ssh/id_ed25519" docker-compose.prod.yml "${PROD_SSH_USERNAME}@${PROD_HOST}:${TARGET_DIR}/docker-compose.prod.yml"

      - name: Deploy latest image and smoke check
        env:
          IMAGE_URI: ${{ needs.build-image.outputs.image_uri }}
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_SSH_USERNAME: ${{ secrets.PROD_SSH_USERNAME }}
          PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
          DEPLOY_DIR: ${{ secrets.PROD_DEPLOY_DIR }}
          GHCR_USERNAME: ${{ secrets.PROD_GHCR_USERNAME }}
          GHCR_READ_TOKEN: ${{ secrets.PROD_GHCR_READ_TOKEN }}
        run: |
          IMAGE_URI_ESCAPED="$(printf '%q' "$IMAGE_URI")"
          GHCR_USERNAME_ESCAPED="$(printf '%q' "$GHCR_USERNAME")"
          GHCR_READ_TOKEN_ESCAPED="$(printf '%q' "$GHCR_READ_TOKEN")"
          TARGET_DIR_ESCAPED="$(printf '%q' "${DEPLOY_DIR:-/opt/skuri/app}")"

          ssh -p "${PROD_SSH_PORT:-22}" -i "$HOME/.ssh/id_ed25519" "${PROD_SSH_USERNAME}@${PROD_HOST}" \
            "IMAGE_URI=${IMAGE_URI_ESCAPED} GHCR_USERNAME=${GHCR_USERNAME_ESCAPED} GHCR_READ_TOKEN=${GHCR_READ_TOKEN_ESCAPED} DEPLOY_DIR=${TARGET_DIR_ESCAPED} bash -s" <<'EOF'
          set -euo pipefail

          cd "$DEPLOY_DIR"
          test -f .env

          echo "$GHCR_READ_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          IMAGE_URI="$IMAGE_URI" docker compose -f docker-compose.prod.yml pull
          IMAGE_URI="$IMAGE_URI" docker compose -f docker-compose.prod.yml up -d

          set -a
          . ./.env
          set +a

          APP_HOST_BIND="${APP_HOST_BIND:-127.0.0.1}"
          APP_PORT="${APP_HOST_PORT:-8080}"
          CORS_SMOKE_ORIGIN="${CD_SMOKE_CORS_ORIGIN:-}"

          if [ "$APP_HOST_BIND" != "127.0.0.1" ]; then
            echo "Production app host bind must stay 127.0.0.1, got: $APP_HOST_BIND" >&2
            exit 1
          fi

          if [ -z "$CORS_SMOKE_ORIGIN" ]; then
            IFS=',' read -r -a CORS_ORIGIN_CANDIDATES <<< "${API_ALLOWED_ORIGIN_PATTERNS:-}"
            for candidate in "${CORS_ORIGIN_CANDIDATES[@]}"; do
              candidate="$(printf '%s' "$candidate" | xargs)"
              if [ -n "$candidate" ] && [[ "$candidate" != *'*'* ]]; then
                CORS_SMOKE_ORIGIN="$candidate"
                break
              fi
            done
          fi

          if [ -z "$CORS_SMOKE_ORIGIN" ]; then
            echo "Cannot determine smoke-check CORS origin. Set CD_SMOKE_CORS_ORIGIN or include at least one exact origin in API_ALLOWED_ORIGIN_PATTERNS." >&2
            exit 1
          fi

          APP_URL="http://${APP_HOST_BIND}:${APP_PORT}"
          for attempt in $(seq 1 24); do
            if curl -fsS "${APP_URL}/actuator/health" >/dev/null; then
              break
            fi
            sleep 5
          done

          curl -fsS "${APP_URL}/actuator/health" >/dev/null

          APP_VERSIONS_RESPONSE="$(curl -fsS "${APP_URL}/v1/app-versions/android")"
          printf '%s' "$APP_VERSIONS_RESPONSE" | grep -q '"success":true'
          printf '%s' "$APP_VERSIONS_RESPONSE" | grep -q '"platform":"android"'

          CORS_HEADERS="$(mktemp)"
          curl -fsS -o /dev/null -D "$CORS_HEADERS" -X OPTIONS \
            "${APP_URL}/v1/app-versions/android" \
            -H "Origin: ${CORS_SMOKE_ORIGIN}" \
            -H 'Access-Control-Request-Method: GET'
          tr -d '\r' < "$CORS_HEADERS" | grep -qi "^access-control-allow-origin: ${CORS_SMOKE_ORIGIN}$"
          tr -d '\r' < "$CORS_HEADERS" | grep -qi '^access-control-allow-methods: .*GET'
          rm -f "$CORS_HEADERS"

          OPENAPI_STATUS="$(curl -o /dev/null -s -w '%{http_code}' "${APP_URL}/v3/api-docs")"
          if [ "$OPENAPI_STATUS" = "200" ]; then
            echo "Production OpenAPI endpoint must stay hidden." >&2
            exit 1
          fi
          EOF
