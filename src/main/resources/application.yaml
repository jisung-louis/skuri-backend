# 공통 기본 설정 파일입니다.
# - 모든 실행 정책(local, local-emulator, prod, test)에 공통으로 적용됩니다.
# - 환경변수(DB_URL, FIREBASE_PROJECT_ID 등)가 있으면 그 값을 우선 사용합니다.
# - 프로필 파일은 "정책", 환경변수는 "실제 값"을 담당합니다.
# - 이 파일만으로 실행할 때는 profile-specific 파일의 값이 없으므로, 필수 값은 환경변수로 주입해야 합니다.
spring:
  application:
    name: skuri-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skuri?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.skuri.skuri_backend: ${LOG_LEVEL_APP:INFO}

firebase:
  auth:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    project-id: ${FIREBASE_PROJECT_ID:}
    use-emulator: ${FIREBASE_AUTH_USE_EMULATOR:false}
    emulator-host: ${FIREBASE_AUTH_EMULATOR_HOST:}
    auto-stop-on-shutdown: ${FIREBASE_AUTH_AUTO_STOP_ON_SHUTDOWN:false}
    emulator-pid-file: ${FIREBASE_AUTH_EMULATOR_PID_FILE:/tmp/firebase-auth-emulator.pid}

security:
  allowed-email-domain: ${ALLOWED_EMAIL_DOMAIN:sungkyul.ac.kr}

chat:
  websocket:
    allowed-origin-patterns: ${CHAT_WS_ALLOWED_ORIGIN_PATTERNS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:local}

app:
  openapi:
    enabled: ${OPENAPI_ENABLED:true}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:true}

scalar:
  enabled: ${OPENAPI_ENABLED:true}
