# 공통 기본 설정 파일입니다.
# - 모든 실행 정책(local, local-emulator, prod, test)에 공통으로 적용됩니다.
# - 프로필별 차이(예: datasource.url, emulator 사용 여부)는 각 application-<profile>.yaml 에서 관리합니다.
# - 환경변수는 실제 값, 프로필 파일은 실행 정책을 담당합니다.
spring:
  application:
    name: skuri-backend

  servlet:
    multipart:
      max-file-size: ${MEDIA_MULTIPART_MAX_FILE_SIZE:12MB}
      max-request-size: ${MEDIA_MULTIPART_MAX_REQUEST_SIZE:12MB}

  datasource:
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
      leak-detection-threshold: ${DB_LEAK_DETECTION_THRESHOLD_MS:20000}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}

  lifecycle:
    timeout-per-shutdown-phase: 20s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${REDIS_TIMEOUT:2000ms}

server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    com.skuri.skuri_backend: ${LOG_LEVEL_APP:INFO}

firebase:
  auth:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    project-id: ${FIREBASE_PROJECT_ID:}

security:
  allowed-email-domain: ${ALLOWED_EMAIL_DOMAIN:sungkyul.ac.kr}

chat:
  websocket:
    allowed-origin-patterns: ${CHAT_WS_ALLOWED_ORIGIN_PATTERNS:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: false

info:
  app:
    name: ${spring.application.name}
    version: ${APP_VERSION:local}

app:
  openapi:
    enabled: ${OPENAPI_ENABLED:true}
  api:
    allowed-origin-patterns: ${API_ALLOWED_ORIGIN_PATTERNS:}

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
  swagger-ui:
    enabled: ${OPENAPI_ENABLED:true}

scalar:
  enabled: ${OPENAPI_ENABLED:true}

media:
  storage:
    provider: ${MEDIA_STORAGE_PROVIDER:LOCAL}
    base-dir: ${MEDIA_STORAGE_BASE_DIR:var/media}
    url-prefix: ${MEDIA_STORAGE_URL_PREFIX:/uploads}
    public-base-url: ${MEDIA_STORAGE_PUBLIC_BASE_URL:}
    firebase-bucket: ${MEDIA_STORAGE_FIREBASE_BUCKET:}
  image:
    max-file-size-bytes: ${MEDIA_IMAGE_MAX_FILE_SIZE_BYTES:10485760}
    allowed-mime-types:
      - image/jpeg
      - image/png
      - image/webp
    max-width: ${MEDIA_IMAGE_MAX_WIDTH:5000}
    max-height: ${MEDIA_IMAGE_MAX_HEIGHT:5000}
    max-pixel-count: ${MEDIA_IMAGE_MAX_PIXEL_COUNT:20000000}
    thumbnail-width: ${MEDIA_IMAGE_THUMBNAIL_WIDTH:300}
    thumbnail-jpeg-quality: ${MEDIA_IMAGE_THUMBNAIL_JPEG_QUALITY:0.8}
