spring:
  application:
    name: skuri-backend

  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skuri?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DB_USERNAME:}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

firebase:
  auth:
    credentials-path: ${FIREBASE_CREDENTIALS_PATH:}
    project-id: ${FIREBASE_PROJECT_ID:}

security:
  allowed-email-domain: ${ALLOWED_EMAIL_DOMAIN:sungkyul.ac.kr}
