# 로컬 백엔드 단독 테스트용 프로필입니다.
# - 이 프로필은 프론트 없이 백엔드만 실행해서, Firebase Auth Emulator가 발급한 ID Token으로 인증 흐름을 빠르게 검증할 때 사용합니다.
# - 즉, "백엔드 로컬 실행 + Firebase Auth Emulator 로컬 실행" 조합을 전제로 합니다.
# - 로컬 MySQL은 호스트의 `localhost:3306`을 기본으로 사용합니다.
# - 이 프로필은 실제 Firebase 서비스 계정 파일이 없어도 동작하도록 설계합니다.
# - 그래서 `FIREBASE_CREDENTIALS_PATH`, `GOOGLE_APPLICATION_CREDENTIALS`는 비워 두는 것이 기본입니다.
# - 대신 `FIREBASE_AUTH_EMULATOR_HOST`, `FIREBASE_PROJECT_ID`는 올바르게 설정해야 합니다.
# - 이 프로필은 서버 종료 시 PID 파일(`/tmp/firebase-auth-emulator.pid`)에 기록된 Emulator 프로세스를 함께 종료합니다.
spring:
  config:
    activate:
      on-profile: local-emulator
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skuri?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}

firebase:
  auth:
    use-emulator: true
    emulator-host: ${FIREBASE_AUTH_EMULATOR_HOST:127.0.0.1:9099}
    project-id: ${FIREBASE_PROJECT_ID:}
    auto-stop-on-shutdown: true
    emulator-pid-file: ${FIREBASE_AUTH_EMULATOR_PID_FILE:/tmp/firebase-auth-emulator.pid}

app:
  api:
    allowed-origin-patterns: ${API_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*,https://*.ngrok-free.app}

chat:
  websocket:
    allowed-origin-patterns: ${CHAT_WS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://10.*:*,http://172.*:*,http://192.168.*:*,https://*.ngrok-free.app}
