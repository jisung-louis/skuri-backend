# 로컬 통합 테스트용 프로필입니다.
# - 이 프로필은 "프론트 + 백엔드"를 함께 붙여서 실제 Firebase ID Token 흐름을 확인할 때 사용합니다.
# - 즉, 프론트가 실제 Firebase 로그인 -> Firebase ID Token 발급 -> 백엔드 API 호출 순서를 로컬에서 그대로 재현하는 용도입니다.
# - 로컬 MySQL은 호스트의 `localhost:3306`을 기본으로 사용합니다.
# - 실제 Firebase를 사용하는 프로필이므로 `FIREBASE_PROJECT_ID`와 `FIREBASE_CREDENTIALS_PATH`(또는 `GOOGLE_APPLICATION_CREDENTIALS`)를 준비해야 합니다.
# - 이 파일에는 "정책"만 두고, 비밀번호/경로 같은 실제 값은 `.env`, IDE 환경변수, 쉘 export로만 주입합니다.
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/skuri?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}

app:
  api:
    allowed-origin-patterns: ${API_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}

chat:
  websocket:
    allowed-origin-patterns: ${CHAT_WS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
